<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cultura Sportlife | O Estilo das Ruas</title>
    <style>
        /* Reset de Estilos Básicos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0d0d0d;
            color: #ffffff;
            line-height: 1.6;
        }

        /* Cabeçalho / Navigation */
        header {
            background-color: #1a1a1a;
            border-bottom: 2px solid #00ff66; /* Verde Neon */
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00ff66;
        }

        header p {
            font-style: italic;
            color: #a6a6a6;
            margin-top: 5px;
        }

        /* Conteúdo Principal */
        main {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Seção de Introdução */
        .intro-section {
            background: linear-gradient(135deg, #1a1a1a 0%, #262626 100%);
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 5px solid #00ff66;
        }

        .intro-section h2 {
            margin-bottom: 15px;
            font-size: 1.8rem;
        }

        /* Container do Vídeo Responsivo */
        .video-container {
            display: flex;
            justify-content: center;
            margin: 30px 0;
            background-color: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .video-container iframe {
            max-width: 100%;
            border-radius: 4px;
        }

        /* Grid de Pilares do Estilo */
        .grid-pilares {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background-color: #1a1a1a;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #333;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #00ff66;
        }
